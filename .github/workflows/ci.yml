name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore HslBikeDataAggregator.slnx

      - name: Build solution
        run: dotnet build HslBikeDataAggregator.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/HslBikeDataAggregator.Tests/HslBikeDataAggregator.Tests.csproj --configuration Release --no-build

  validate-infrastructure:
    name: Validate infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate Bicep template and parameter files
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          inlineScript: |
            az bicep install
            az bicep version
            az bicep build --file infra/main.bicep
            az bicep build-params --file infra/dev.bicepparam
            az bicep build-params --file infra/prod.bicepparam
