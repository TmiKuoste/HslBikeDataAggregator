name: Deploy prod

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git ref to deploy to production
        required: true
        default: main
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production environment
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-hsl-bike-data-aggregator-prod' }}
      AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTION_APP_NAME || 'func-hsl-bike-data-aggregator-prod-flex' }}
      AZURE_APIM_SERVICE_NAME: ${{ vars.AZURE_APIM_SERVICE_NAME || 'apim-hsl-bike-data-aggregator-prod' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git-ref }}

      - name: Validate deployment ref
        run: |
          if [ "${{ inputs.git-ref }}" != "main" ]; then
            echo "::error::Production deployments are restricted to the main branch."
            exit 1
          fi

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore HslBikeDataAggregator.slnx

      - name: Build solution
        run: dotnet build HslBikeDataAggregator.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/HslBikeDataAggregator.Tests/HslBikeDataAggregator.Tests.csproj --configuration Release --no-build

      - name: Publish Function App
        run: dotnet publish src/HslBikeDataAggregator/HslBikeDataAggregator.csproj --configuration Release --output ./artifacts/publish

      - name: Create deployment package
        run: cd artifacts/publish && zip -r ../released-package.zip .

      - name: Sign in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if needed
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az group create \
              --name "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION"

      - name: Purge soft-deleted APIM instance if lingering
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            if az apim deletedservice show \
              --service-name "$AZURE_APIM_SERVICE_NAME" \
              --location "$AZURE_LOCATION" \
              --output none 2>/dev/null; then
              echo "Purging soft-deleted APIM instance $AZURE_APIM_SERVICE_NAME…"
              az apim deletedservice purge \
                --service-name "$AZURE_APIM_SERVICE_NAME" \
                --location "$AZURE_LOCATION"
            else
              echo "No soft-deleted APIM instance found — proceeding."
            fi

      - name: Deploy infrastructure
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters @infra/prod.json \
              functionAppName="$AZURE_FUNCTION_APP_NAME" \
              location="$AZURE_LOCATION"

      - name: Configure Digitransit subscription key
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az functionapp config appsettings set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_FUNCTION_APP_NAME" \
              --settings DigitransitSubscriptionKey="${{ secrets.DIGITRANSIT_SUBSCRIPTION_KEY }}"

      - name: Configure history processing settings
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        with:
          inlineScript: |
            az functionapp config appsettings set \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_FUNCTION_APP_NAME" \
              --settings HistoryProcessingCron="${{ vars.HISTORY_PROCESSING_CRON || '0 0 2 * * *' }}"

      - name: Deploy Function App package
        uses: Azure/functions-action@ac2abfb0e49d12ed5d273a3cb39f01bdd1654c43 # v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP_NAME }}
          package: ./artifacts/released-package.zip
          sku: flexconsumption
